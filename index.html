<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCTV工事費判定ツール</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif;background:#f4f7fb;color:#172033}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0c4d80,#1769aa)}
.box{width:min(420px,100%);background:#fff;border-radius:16px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.3)}
h1{font-size:22px;margin:0 0 8px}
p{margin:0 0 16px;color:#68758d;line-height:1.6;font-size:13px}
.row{display:flex;gap:8px;align-items:stretch}
/* テキスト入力だけにスタイルを限定（拡張機能等がinput全体へ流し込むCSSで崩れないよう明示） */
input[type="password"],input[type="text"]{flex:1 1 auto;min-width:0;width:auto;padding:11px;border:1px solid #c8d3e1;border-radius:9px;font-size:16px}
button{flex:0 0 auto;border:0;background:#1769aa;color:#fff;border-radius:9px;padding:11px 16px;font-weight:700;cursor:pointer}
.err{margin-top:10px;color:#b42318;font-size:13px;font-weight:700;display:none}
.remember{display:flex;gap:8px;align-items:center;margin-top:14px;font-size:13px}
/* !important で拡張機能等が注入する input{width:100%!important} 等の上書きを無効化 */
.remember input[type="checkbox"]{flex:0 0 auto!important;width:16px!important;height:16px!important;padding:0!important;margin:0!important;border:1px solid #9aa7bd!important;border-radius:3px!important;box-sizing:border-box}
.remember span{flex:1 1 auto;min-width:0}
.note{margin-top:14px;font-size:11px;color:#8792a5;line-height:1.6}
</style>
</head>
<body>
<div class="gate">
  <div class="box">
    <h1>SCTV工事費判定ツール</h1>
    <p>パスワードを入力してください。</p>
    <div class="row">
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" placeholder="パスワード">
      <button id="open" type="button">開く</button>
    </div>
    <div id="err" class="err">パスワードが違うか、復号に失敗しました。</div>
    <label class="remember">
      <input id="remember" type="checkbox" checked>
      <span>このブラウザでは次回から入力を省略</span>
    </label>
    <div class="note">アプリ本体は暗号化されています。パスワード入力後に復号して表示します。</div>
  </div>
</div>

const ITER=200000;
const STORE="sctv_fee_tool_key_v2";

const b64ToBytes = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const bytesToB64 = bytes => btoa(String.fromCharCode(...bytes));

async function derive(password) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64ToBytes(SALT), iterations:ITER, hash:"SHA-256"},
    base,
    {name:"AES-GCM", length:256},
    true,
    ["decrypt"]
  );
}

async function decryptWithKey(key) {
  const plain = await crypto.subtle.decrypt(
    {name:"AES-GCM", iv:b64ToBytes(IV)},
    key,
    b64ToBytes(DATA)
  );
  const html = new TextDecoder().decode(plain);
  document.open();
  document.write(html);
  document.close();
}

async function tryStored() {
  try {
    const raw = localStorage.getItem(STORE);
    if (!raw) return false;
    const key = await crypto.subtle.importKey("raw", b64ToBytes(raw), "AES-GCM", false, ["decrypt"]);
    await decryptWithKey(key);
    return true;
  } catch(e) {
    localStorage.removeItem(STORE);
    return false;
  }
}

async function unlock() {
  const err = document.getElementById("err");
  err.style.display="none";
  try {
    if (!crypto.subtle) throw new Error("Web Crypto unavailable");
    const key = await derive(document.getElementById("pw").value);
    if (document.getElementById("remember").checked) {
      const raw = new Uint8Array(await crypto.subtle.exportKey("raw", key));
      localStorage.setItem(STORE, bytesToB64(raw));
    }
    await decryptWithKey(key);
  } catch(e) {
    err.style.display="block";
    document.getElementById("pw").select();
  }
}

document.getElementById("open").addEventListener("click", unlock);
document.getElementById("pw").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});

tryStored().then(done => {
  if (!done) setTimeout(() => document.getElementById("pw").focus(), 50);
});
</script>
